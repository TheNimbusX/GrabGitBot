# Продакшен: в .env — APP_DOMAIN, APP_URL, DB_HOST=mysql, TELEGRAM_BOT_TOKEN, APP_DEBUG=false.
# Если порты 80/443 заняты (Apache/cPanel), задай CADDY_HTTP_PORT=8080 и CADDY_HTTPS_PORT=8443
# (у Telegram для вебхука допустимы в т.ч. 443, 80, 88, 8443).
#
# Расписание (10:00 / 20:00 по APP_TIMEZONE, по умолчанию МСК): сервис scheduler или cron schedule:run.
# Без Europe/Moscow в .env вечерний пуш в 20:00 по Москве не совпадёт с dailyAt('20:00').

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build: .
    restart: unless-stopped
    # Не используем env_file: тогда Docker кладёт APP_KEY в окружение до Laravel;
    # dotenv immutable не перезаписывает его — при base64 с «=» в конце ключ часто пустой.
    # Laravel читает ./.env с примонтированного тома сам.
    volumes:
      - ./:/var/www/html
      - ./docker/php/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      mysql:
        condition: service_healthy

  # Laravel schedule: без этого (и без cron schedule:run на хосте) утренние/вечерние рассылки не пойдут.
  scheduler:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started

  # Long polling. На РФ-VPS часто нет исходящего доступа к api.telegram.org — нужен TELEGRAM_HTTP_PROXY или VPS за РФ.
  # Вебхук сними вручную с ПК, затем --keep-webhook (иначе при старте будет лишний вызов deleteWebhook).
  telegram-poll:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/poll-entrypoint.sh:/poll-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/poll-entrypoint.sh"]
    command: ["--no-interaction", "--keep-webhook"]
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-fitbot}
      MYSQL_USER: ${DB_USERNAME:-fitbot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fitbot}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
